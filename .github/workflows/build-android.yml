name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web app
      run: npm run build
    
    - name: Sync web resources to Android
      run: npx cap sync android
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: '21'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Make gradlew executable
      run: chmod +x ./android/gradlew

    - name: Create keystore file from GitHub Secrets
      run: |
        cd android
        if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "Error: KEYSTORE_BASE64 secret is not set"
          exit 1
        fi
        if [ -f "my-release-key.keystore" ]; then
          rm -f my-release-key.keystore
        fi
        echo "Creating keystore file from GitHub Secrets"
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-release-key.keystore
        echo "=== Listing aliases in keystore ==="
        keytool -list -keystore my-release-key.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}"
        echo "=== Keystore file details ==="
        ls -la my-release-key.keystore
        file my-release-key.keystore

    - name: Extract SHA1 from keystore
      run: |
        cd android
        echo "Run # 将 base64 编码的 keystore 还原为文件"
        echo "# 将 base64 编码的 keystore 还原为文件"
        echo ""
        full_output=$(keytool -list -v -keystore my-release-key.keystore -alias "${{ secrets.KEY_ALIAS }}" -storepass "${{ secrets.KEYSTORE_PASSWORD }}")
        
        sha1_with_colons=$(echo "$full_output" | grep -i "sha1:" | head -1 | sed 's/.*sha1:\s*//i' | sed 's/\s*$//')
        sha256_with_colons=$(echo "$full_output" | grep -i "sha256:" | head -1 | sed 's/.*sha256:\s*//i' | sed 's/\s*$//')
        md5_with_colons=$(echo "$full_output" | grep -i "md5:" | head -1 | sed 's/.*md5:\s*//i' | sed 's/\s*$//')
        
        echo "===== 证书指纹 ====="
        echo "     SHA1: $sha1_with_colons"
        echo "     SHA256: $sha256_with_colons"
        echo "===================="
        echo ""
        echo "===== MD5 指纹 ====="
        echo "$md5_with_colons"
        echo "===================="
        echo ""
        echo "===== SHA1 指纹（小米应用商店用）====="
        echo "$sha1_with_colons"
        echo "======================================="
        echo ""
        echo "===== 去掉冒号的 SHA1（直接复制）====="
        sha1_without_colons=$(echo "$sha1_with_colons" | tr -d ":")
        echo "$sha1_without_colons"
        echo "======================================="
        echo ""
        echo "===== 公钥信息 ====="
        echo "Certificate fingerprints:"
        echo "     SHA1: $sha1_with_colons"
        echo "     SHA256: $sha256_with_colons"
        signature_algorithm=$(echo "$full_output" | grep -i "Signature algorithm name" | head -1 | sed 's/.*://' | sed 's/\s*$//')
        echo "Signature algorithm name: $signature_algorithm"
        echo "============================="

    - name: Build Android Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd android
        echo "=== Building Release APK ==="
        echo "  KEY_ALIAS env -> $KEY_ALIAS"
        echo "  KEYSTORE_PASSWORD length -> ${#KEYSTORE_PASSWORD} chars"
        echo "  keystore file path (relative to android/app/build.gradle -> ../my-release-key.keystore):"
        ls -la my-release-key.keystore
        ./gradlew clean
        ./gradlew assembleRelease --no-build-cache --no-daemon
        ls -la app/build/outputs/apk/release/

    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
