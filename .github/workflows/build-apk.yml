name: Build Android APK (Debug)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: ① Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Node.js + npm 依赖安装 + Vite 前端构建
      # ------------------------------------------------------------
      - name: ② Setup Node.js (v22 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: ③ Install npm dependencies
        run: npm ci --prefer-offline --no-audit --no-fund || npm install --no-audit --no-fund

      - name: ④ Build frontend (Vite production)
        run: npm run build

      # ------------------------------------------------------------
      # Capacitor 同步：把 dist/ 产物拷贝进 android/app/src/main/assets/public
      # ------------------------------------------------------------
      - name: ⑤ Capacitor sync → android
        run: npx --yes @capacitor/cli sync android --no-deployment

      # ------------------------------------------------------------
      # JDK 17（Android Gradle Plugin 8.x / Capacitor 6 要求）
      # ------------------------------------------------------------
      - name: ⑥ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ------------------------------------------------------------
      # Android SDK（通过 gradle 自动安装缺失组件）
      # ------------------------------------------------------------
      - name: ⑦ Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: ⑧ Accept Android SDK licenses & install missing components
        run: |
          set -e
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            >/dev/null 2>&1 || true

      # ------------------------------------------------------------
      # 构建 Debug APK（app-debug.apk）
      # ------------------------------------------------------------
      - name: ⑨ Gradle assembleDebug
        working-directory: android
        env:
          GRADLE_OPTS: -Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      # ------------------------------------------------------------
      # 上传 APK 作为 Artifact（可在 Actions 页面下载）
      # ------------------------------------------------------------
      - name: ⑩ Locate APK files
        id: find-apk
        run: |
          APK_DIR="android/app/build/outputs/apk/debug"
          echo "apk_dir=$APK_DIR" >> "$GITHUB_OUTPUT"
          ls -la "$APK_DIR"
          APK_NAME=$(find "$APK_DIR" -name "*.apk" | head -1)
          echo "apk_path=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_file=$(basename $APK_NAME)" >> "$GITHUB_OUTPUT"

      - name: ⑪ Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wanxuyuzhou-debug-apk
          path: ${{ steps.find-apk.outputs.apk_dir }}/*.apk
          retention-days: 30

      - name: ⑫ Summary
        run: |
          echo "### ✅ APK 构建成功！" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- 分支：\`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 提交：\`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- APK 文件：\`${{ steps.find-apk.outputs.apk_file }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 下载入口：本 run 页面 Artifacts → \`wanxuyuzhou-debug-apk\`" >> "$GITHUB_STEP_SUMMARY"
